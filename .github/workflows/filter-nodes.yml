name: Filter Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: filter-cloudflare-nodes
  cancel-in-progress: false

jobs:
  filter:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CF_TRACE_HOST: ${{ vars.CF_TRACE_HOST }}
      EDGETUNNEL_HOST: ${{ vars.EDGETUNNEL_HOST }}
      EDGETUNNEL_PATH: ${{ secrets.EDGETUNNEL_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run offline unit tests
        run: node --test ./cf-filter-core.test.mjs

      - name: Show verification mode
        shell: bash
        run: |
          if [[ -n "$EDGETUNNEL_HOST" && -n "$EDGETUNNEL_PATH" ]]; then
            echo "Using verified Cloudflare trace plus EdgeTunnel WebSocket checks."
          elif [[ -n "$EDGETUNNEL_HOST" ]]; then
            echo "Using verified Cloudflare trace for the configured EdgeTunnel host."
          elif [[ -n "$CF_TRACE_HOST" ]]; then
            echo "Using verified Cloudflare trace for the configured host."
          else
            echo "Using verified Cloudflare trace for speed.cloudflare.com."
          fi

      - name: Filter high-speed balanced nodes
        run: |
          node cf-filter-local.mjs \
            --limit 150 \
            --scan 3000 \
            --concurrency 120 \
            --timeout 2500 \
            --max-probe 1200 \
            --probe-attempts 3 \
            --min-probe-successes 2 \
            --speed-scan 180 \
            --speed-bytes 4194304 \
            --speed-concurrency 8 \
            --speed-timeout 12000 \
            --speed-attempts 3 \
            --min-speed-successes 2 \
            --min-speed-ms 100 \
            --min-speed 10 \
            --fallback-min-speed 5 \
            --strict-min-speed 1 \
            --edge-attempts 3 \
            --min-edge-successes 2 \
            --edge-concurrency 16 \
            --min-source-successes 2 \
            --min-output 20 \
            --out filtered-best-nodes.txt \
            --json filtered-best-nodes.json

      - name: Commit filtered result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          result_dir="$(mktemp -d)"
          cp filtered-best-nodes.txt filtered-best-nodes.json "$result_dir/"
          git fetch origin main
          git reset --hard origin/main
          cp "$result_dir/filtered-best-nodes.txt" "$result_dir/filtered-best-nodes.json" .
          git add filtered-best-nodes.txt filtered-best-nodes.json
          git diff --cached --quiet || git commit -m "chore: 更新优选节点"
          git push
