name: Filter Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  filter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run offline unit tests
        run: node --test ./cf-filter-core.test.mjs

      # CI 位于海外机房,本地测速对中国用户无参考价值。
      # rank-by-source 模式:只验证节点全球可达(trace),排序信任
      # wetest/hostmonit/090227/HandsomeMJZ 等中国三网实测源的数据。
      - name: Filter nodes trusted by China-measured sources
        run: |
          unset HTTP_PROXY HTTPS_PROXY ALL_PROXY http_proxy https_proxy all_proxy
          node cf-filter-local.mjs \
            --limit 150 \
            --scan 5000 \
            --concurrency 120 \
            --timeout 2500 \
            --max-probe 1800 \
            --subnet-limit 1 \
            --rank-by-source 1 \
            --min-source-speed 10 \
            --fallback-min-source-speed 5 \
            --out filtered-best-nodes.txt \
            --json filtered-best-nodes.json

      - name: Commit filtered result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          result_dir="$(mktemp -d)"
          cp filtered-best-nodes.txt filtered-best-nodes.json "$result_dir/"
          git fetch origin main
          git reset --hard origin/main
          cp "$result_dir/filtered-best-nodes.txt" "$result_dir/filtered-best-nodes.json" .
          git add filtered-best-nodes.txt filtered-best-nodes.json
          git diff --cached --quiet || git commit -m "chore: 更新优选节点"
          git push
